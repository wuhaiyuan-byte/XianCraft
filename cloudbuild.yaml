
steps:
# --- Step 1: Build the frontend ---
- name: 'gcr.io/cloud-builders/npm:20'
  id: 'Build Frontend'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    cd client
    npm install
    npm run build

# --- Step 2: Build the Rust backend for static linking ---
- name: 'rust:1.79-bullseye'
  id: 'Build Backend'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    # Install the MUSL C toolchain required for a static build
    apt-get update && apt-get install -y musl-tools
    # Add the MUSL target for the Rust compiler
    rustup target add x86_64-unknown-linux-musl
    # Build the application with the MUSL target
    cargo build --release --target=x86_64-unknown-linux-musl

# --- Step 3: Package the final application into a minimal Docker image ---
- name: 'gcr.io/cloud-builders/docker'
  id: 'Package'
  args:
  - 'build'
  - '-t'
  - 'gcr.io/$PROJECT_ID/xiancraft-server:latest'
  - '.'
  - '-f'
  - 'cloudbuild-docker.Dockerfile' # We will create a simplified Dockerfile for this step

# --- Step 4: Deploy to Cloud Run ---
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'Deploy'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'xiancraft-server'
  - '--image'
  - 'gcr.io/$PROJECT_ID/xiancraft-server:latest'
  - '--region'
  - 'us-central1' # You may need to change this to your desired region
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'

# Specify the final image to be pushed to Google Container Registry
images:
- 'gcr.io/$PROJECT_ID/xiancraft-server:latest'
