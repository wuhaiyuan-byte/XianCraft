# This workflow is triggered on pushes to the master branch.
# It builds and deploys the client-side application to Firebase Hosting.

name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # <-- Updated from 18 to 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies and Build
        run: npm ci && npm run build
        working-directory: ./client

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_XIANCRAFT }}'
          channelId: live
          projectId: XianCraft
