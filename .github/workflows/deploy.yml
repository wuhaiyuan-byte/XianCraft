name: Deploy XianCraft

# This workflow is triggered when code is pushed to the 'master' branch.
on: 
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('''**/Cargo.lock''') }}

      - name: Build Rust application
        run: |
          # Source the cargo environment to add cargo to the PATH
          source "$HOME/.cargo/env"
          cargo build --release --verbose

      - name: Deploy
        run: |
          echo "Deploying the application..."
          # Use absolute path for the binary to make sudoers configuration straightforward.
          # The GITHUB_WORKSPACE variable is provided by the GitHub Actions runner.
          sudo mkdir -p /srv/xiancraft
          sudo cp "${GITHUB_WORKSPACE}/target/release/server" /srv/xiancraft/server
          sudo systemctl restart xiancraft.service
