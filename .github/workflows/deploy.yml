name: Deploy XianCraft

# This workflow is triggered when code is pushed to the 'master' branch.
on: 
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # The "Set up Rust" step has been removed. 
      # We will rely on the toolchain being pre-installed and kept up-to-date
      # on the self-hosted runner machine itself.

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('''**/Cargo.lock''') }}

      - name: Build Rust application
        run: cargo build --release --verbose

      - name: Deploy
        run: |
          echo "Deploying the application..."
          sudo mkdir -p /srv/xiancraft
          sudo cp target/release/server /srv/xiancraft/server
          sudo systemctl restart xiancraft.service
