name: Deploy XianCraft

# This workflow is triggered when code is pushed to the 'master' branch.
on: 
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Rust Backend Steps ---
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Rust application
        run: cargo build --release --verbose

      # --- Node.js Frontend Steps ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./client

      - name: Build frontend
        run: npm run build
        working-directory: ./client

      # --- Deployment Steps ---
      - name: Deploy to Server
        run: |
          echo "Creating/Updating systemd service file..."
          echo '[Unit]
          Description=XianCraft Game Server
          After=network.target

          [Service]
          Environment=DATA_DIR=/srv/xiancraft/data
          Environment=STATIC_DIR=/srv/xiancraft/frontend
          Environment=PORT=3000

          User=xiancraft-runner
          Group=xiancraft-runner
          WorkingDirectory=/srv/xiancraft
          ExecStart=/srv/xiancraft/server
          Restart=always
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target' | sudo tee /etc/systemd/system/xiancraft.service

          echo "Reloading systemd daemon to apply changes..."
          sudo systemctl daemon-reload
          
          echo "Ensuring service is enabled to start on boot..."
          sudo systemctl enable xiancraft.service

          echo "Creating deployment directories..."
          sudo mkdir -p /srv/xiancraft/data
          sudo mkdir -p /srv/xiancraft/frontend

          echo "Deploying files..."
          sudo cp "${{ github.workspace }}/target/release/server" /srv/xiancraft/server
          sudo cp -r "${{ github.workspace }}/data/." /srv/xiancraft/data/
          sudo cp -r "${{ github.workspace }}/client/dist/." /srv/xiancraft/frontend/
          
          echo "Setting correct ownership..."
          sudo chown -R xiancraft-runner:xiancraft-runner /srv/xiancraft

          echo "Restarting XianCraft service..."
          sudo systemctl restart xiancraft.service
